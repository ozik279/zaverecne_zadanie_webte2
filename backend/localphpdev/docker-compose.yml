services:
  frontend:
    image: node:20-alpine
    container_name: dev_frontend
    working_dir: /app
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && tail -f /dev/null"
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/dist/index.html"]
      interval: 5s
      timeout: 3s
      retries: 30

  nginx:
    image: nginx:latest
    container_name: dev_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src/api:/var/www/html/api
      - ../../frontend:/var/www/html/frontend:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      frontend:
        condition: service_healthy
      php:
        condition: service_started
      db:
        condition: service_started

  php:
    build: ./php
    container_name: dev_php
    command: sh -lc "cd /var/www/html/api && php artisan migrate --force && php-fpm"
    volumes:
      - ./src/api:/var/www/html/api
      - ../../other:/var/www/html/other:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: dev_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dev_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: app_user
      PMA_PASSWORD: app_pass
    depends_on:
      - db

volumes:
  db_data:
  frontend_node_modules:
